<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>七色花手抄报 - A4横版</title>
    <style>
        @page { size: A4 landscape; margin: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { width: 297mm; height: 210mm; overflow: hidden; }
        
        body {
            font-family: "楷体", "KaiTi", serif;
            padding: 3mm;
            font-size: 11px;
            line-height: 1.35;
        }
        
        .border {
            position: absolute;
            top: 2mm; left: 2mm; right: 2mm; bottom: 2mm;
            border: 3px solid #333;
        }
        
        .title {
            text-align: center;
            font-size: 44px;
            font-weight: bold;
            color: #e91e63;
            letter-spacing: 16px;
        }
        
        .rainbow {
            height: 24px;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            border-radius: 12px;
            margin: 4mm 0;
        }
        
        .main-title {
            font-size: 16px;
            font-weight: bold;
            color: #e91e63;
            text-align: center;
            margin-bottom: 8px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 4px;
        }
        
        .intro-text {
            font-size: 13px;
            line-height: 1.6;
            text-indent: 1.5em;
            color: #333;
            margin-bottom: 4mm;
        }
        
        .flower-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 4mm;
        }
        
        .flower-col {
            flex: 1;
            text-align: center;
            padding: 10px;
        }
        
        .main-flower {
            width: 160px;
            height: 160px;
        }
        
        .deco-row {
            display: flex;
            justify-content: space-around;
            gap: 3mm;
            margin-bottom: 3mm;
        }
        
        .deco-box {
            flex: 1;
            border: 1.5px dashed #888;
            padding: 8px;
            text-align: center;
            background: #f8f8f8;
            min-height: 70px;
        }
        
        .deco-label {
            font-size: 10px;
            color: #555;
            margin-bottom: 4px;
            font-weight: bold;
        }
        
        .footer { 
            text-align: center; 
            font-size: 12px; 
            color: #777; 
            font-weight: bold;
        }
        
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div class="border">
        <div style="padding: 3mm;">
            <h1 class="title">🌸 七色花 🌸</h1>
            <p style="text-align:center;font-size:12px;color:#555;margin-bottom:2mm;">—— 经典童话故事 · 小学生阅读手抄报</p>
            <div class="rainbow"></div>
            
            <!-- 故事简介文字（无边框） -->
            <div class="main-title">📖 故事简介</div>
            <p class="intro-text">
                《七色花》是苏联作家瓦·卡泰耶夫写的经典童话。小姑娘珍妮得到一朵神奇的七色花，有七片不同颜色的花瓣，每片都能实现一个愿望。珍妮用最后一片花瓣帮助了有腿疾的小男孩，让他可以跑跳。虽然花失去了魔力，但珍妮心里充满快乐——帮助别人是最珍贵的愿望！
            </p>
            
            <!-- 三朵七色花并排 -->
            <div class="flower-row">
                <div class="flower-col">
                    <svg class="main-flower" viewBox="0 0 200 200" fill="none" stroke="#000" stroke-width="2">
                        <line x1="100" y1="120" x2="100" y2="195" stroke="#2e7d32" stroke-width="5"/>
                        <ellipse cx="70" cy="160" rx="22" ry="10" fill="none" stroke="#2e7d32"/>
                        <ellipse cx="130" cy="160" rx="22" ry="10" fill="none" stroke="#2e7d32"/>
                        <circle cx="100" cy="90" r="18" fill="#ffeb3b"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(0 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(51.4 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(102.8 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(154.2 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(205.6 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(257 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(308.4 100 90)"/>
                    </svg>
                    <p style="font-size:11px;color:#666;">七色花 ❤</p>
                </div>
                
                <div class="flower-col">
                    <svg class="main-flower" viewBox="0 0 200 200" fill="none" stroke="#000" stroke-width="2">
                        <line x1="100" y1="120" x2="100" y2="195" stroke="#2e7d32" stroke-width="5"/>
                        <ellipse cx="70" cy="160" rx="22" ry="10" fill="none" stroke="#2e7d32"/>
                        <ellipse cx="130" cy="160" rx="22" ry="10" fill="none" stroke="#2e7d32"/>
                        <circle cx="100" cy="90" r="18" fill="#ffeb3b"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(0 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(51.4 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(102.8 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(154.2 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(205.6 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(257 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(308.4 100 90)"/>
                    </svg>
                    <p style="font-size:11px;color:#666;">帮助他人 ✨</p>
                </div>
                
                <div class="flower-col">
                    <svg class="main-flower" viewBox="0 0 200 200" fill="none" stroke="#000" stroke-width="2">
                        <line x1="100" y1="120" x2="100" y2="195" stroke="#2e7d32" stroke-width="5"/>
                        <ellipse cx="70" cy="160" rx="22" ry="10" fill="none" stroke="#2e7d32"/>
                        <ellipse cx="130" cy="160" rx="22" ry="10" fill="none" stroke="#2e7d32"/>
                        <circle cx="100" cy="90" r="18" fill="#ffeb3b"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(0 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(51.4 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(102.8 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(154.2 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(205.6 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(257 100 90)"/>
                        <ellipse cx="100" cy="45" rx="16" ry="35" transform="rotate(308.4 100 90)"/>
                    </svg>
                    <p style="font-size:11px;color:#666;">快乐分享 🌟</p>
                </div>
            </div>
            
            <!-- 点缀图案 -->
            <div class="deco-row">
                <div class="deco-box">
                    <div class="deco-label">🎨 珍妮</div>
                    <svg style="width:45px;height:55px;" viewBox="0 0 60 80" fill="none" stroke="#000" stroke-width="1.5">
                        <path d="M15 20 Q30 5 45 20 Q50 35 45 40 L15 40 Q10 35 15 20"/>
                        <circle cx="24" cy="32" r="3"/>
                        <circle cx="36" cy="32" r="3"/>
                        <path d="M27 40 Q30 43 33 40"/>
                        <line x1="30" y1="45" x2="30" y2="65"/>
                        <path d="M20 65 L30 75 L40 65"/>
                        <line x1="25" y1="75" x2="22" y2="85"/>
                        <line x1="35" y1="75" x2="38" y2="85"/>
                    </svg>
                </div>
                <div class="deco-box">
                    <div class="deco-label">🎨 彩虹</div>
                    <svg style="width:65px;height:30px;" viewBox="0 0 80 40" fill="none">
                        <path d="M5 40 Q40 -15 75 40" stroke="#e91e63" stroke-width="3"/>
                        <path d="M10 40 Q40 -5 70 40" stroke="#ff9800" stroke-width="3"/>
                        <path d="M15 40 Q40 5 65 40" stroke="#ffeb3b" stroke-width="3"/>
                        <path d="M20 40 Q40 15 60 40" stroke="#4caf50" stroke-width="3"/>
                        <path d="M25 40 Q40 25 55 40" stroke="#2196f3" stroke-width="3"/>
                    </svg>
                </div>
                <div class="deco-box">
                    <div class="deco-label">🎨 太阳</div>
                    <svg style="width:45px;height:45px;" viewBox="0 0 60 60" fill="none" stroke="#000" stroke-width="1.5">
                        <circle cx="30" cy="30" r="12"/>
                        <line x1="30" y1="5" x2="30" y2="15"/>
                        <line x1="30" y1="45" x2="30" y2="55"/>
                        <line x1="5" y1="30" x2="15" y2="30"/>
                        <line x1="45" y1="30" x2="55" y2="30"/>
                        <line x1="12" y1="12" x2="19" y2="19"/>
                        <line x1="41" y1="41" x2="48" y2="48"/>
                        <line x1="12" y1="48" x2="19" y2="41"/>
                        <line x1="41" y1="19" x2="48" y2="12"/>
                    </svg>
                </div>
                <div class="deco-box">
                    <div class="deco-label">🎨 云朵</div>
                    <svg style="width:55px;height:35px;" viewBox="0 0 60 40" fill="none" stroke="#000" stroke-width="1.5">
                        <path d="M10 35 Q5 25 15 20 Q15 10 30 10 Q40 5 45 15 Q55 15 55 25 Q55 35 45 35 Z"/>
                    </svg>
                </div>
                <div class="deco-box">
                    <div class="deco-label">🎨 爱心</div>
                    <svg style="width:40px;height:40px;" viewBox="0 0 50 50" fill="none" stroke="#000" stroke-width="1.5">
                        <path d="M25 45 L8 25 Q3 17 12 12 Q20 8 25 17 Q30 8 38 12 Q47 17 42 25 Z"/>
                    </svg>
                </div>
                <div class="deco-box">
                    <div class="deco-label">🎨 星星</div>
                    <svg style="width:40px;height:40px;" viewBox="0 0 50 50" fill="none" stroke="#000" stroke-width="1.5">
                        <polygon points="25,5 30,20 45,20 33,30 38,45 25,35 12,45 17,30 5,20 20,20"/>
                    </svg>
                </div>
            </div>
            
            <div class="footer">✨ 七色花 · 经典童话故事 ✨ 动手画一画，涂一涂</div>
        </div>
    </div>
</body>
</html>
